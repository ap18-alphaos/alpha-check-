<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Alpha Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(0, 140, 255, 0.3);
    }
    h1 {
      text-align: center;
      color: #00aaff;
    }
    select, input, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }
    button {
      background: #00aaff;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      opacity: 0.9;
    }
    .result {
      margin-top: 20px;
      background: #000;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
    a.whatsapp {
      display: block;
      margin-top: 10px;
      text-align: center;
      background: #25D366;
      padding: 12px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Alpha Check</h1>

  <label>Modelo do iPhone</label>
  <select id="modelo">
  <option>iPhone SE</option>
  <option>iPhone XR</option>
  <option>iPhone XS</option>
  <option>iPhone 11</option>
  <option>iPhone 12</option>
  <option>iPhone 12 Pro</option>
  <option>iPhone 13</option>
  <option>iPhone 13 Pro</option>
  <option>iPhone 14</option>
  <option>iPhone 14 Pro</option>
  <option>iPhone 15</option>
  <option>iPhone 15 Pro</option>
  <option>iPhone 16</option>
  <option>iPhone 16 Pro</option>
</select>

<select id="problema">
  <option>Troca de bateria</option>
  <option>Troca de tela</option>
  <option>Não liga</option>
  <option>Sem sinal</option>
  <option>Face ID não funciona</option>
  <option>Problema no conector de carga</option>
  <option>Problema na câmera</option>
  <option>Alto-falante sem som</option>
</select>

  <label>Há quanto tempo começou?</label>
  <input type="text" id="tempo" placeholder="Ex: 2 dias, 1 semana">

  <button onclick="gerarDiagnostico()">Gerar diagnóstico</button>

  <div class="result" id="resultado"></div>
</div>

<script>
function gerarDiagnostico() {
  const modelo = document.getElementById('modelo').value;
  const problema = document.getElementById('problema').value;
  const tempo = document.getElementById('tempo').value;

  let diagnostico = "";
  let valor = "";
  let prazo = "";

  // 💰 TABELA DE PREÇOS (você pode ajustar depois)
  const precos = {
    "Troca de tela": {
      "iPhone 11": 400,
      "iPhone 12": 600,
      "iPhone 13": 800,
      "iPhone 14": 1000,
      "iPhone 15": 1200
    },
    "Troca de bateria": {
      "iPhone 11": 200,
      "iPhone 12": 250,
      "iPhone 13": 300,
      "iPhone 14": 350,
      "iPhone 15": 400
    }
  };

  if (problema.includes("bateria")) {
    diagnostico = "Substituição de bateria recomendada.";
    valor = `R$ ${precos["Troca de bateria"][modelo] || 300}`;
    prazo = "30 a 60 minutos";

  } else if (problema.includes("tela")) {
    diagnostico = "Necessária troca de display.";
    valor = `R$ ${precos["Troca de tela"][modelo] || 800}`;
    prazo = "40 minutos";

  } else if (problema.includes("Face ID")) {
    diagnostico = "Falha em sensores do Face ID ou flex.";
    valor = "R$ 300 - R$ 800";
    prazo = "1 a 2 dias";

  } else if (problema.includes("Não liga")) {
    diagnostico = "Possível falha em placa lógica ou bateria.";
    valor = "R$ 300 - R$ 900";
    prazo = "1 a 3 dias";

  } else if (problema.includes("carga")) {
    diagnostico = "Possível falha no conector ou circuito de carga.";
    valor = "R$ 200 - R$ 500";
    prazo = "1 dia";

  } else if (problema.includes("câmera")) {
    diagnostico = "Problema no módulo de câmera.";
    valor = "R$ 250 - R$ 700";
    prazo = "1 dia";

  } else if (problema.includes("Alto")) {
    diagnostico = "Falha no alto-falante.";
    valor = "R$ 150 - R$ 350";
    prazo = "1 dia";
  }

  const mensagem = `Olá, fiz um diagnóstico no Alpha Check:

Modelo: ${modelo}
Problema: ${problema}
Tempo: ${tempo}

Diagnóstico: ${diagnostico}
Valor estimado: ${valor}
Prazo: ${prazo}`;

  const link = `https://wa.me/55991269300?text=${encodeURIComponent(mensagem)}`;

  const resultado = document.getElementById('resultado');
  resultado.style.display = "block";
  resultado.innerHTML = `
    <strong>Diagnóstico:</strong> ${diagnostico}<br>
    <strong>Valor:</strong> ${valor}<br>
    <strong>Prazo:</strong> ${prazo}
    <a class="whatsapp" href="${link}" target="_blank">Falar no WhatsApp</a>
  `;
}
</script>

</body>
</html>
