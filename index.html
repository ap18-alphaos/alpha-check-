<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Alpha System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="/icon-192.png">

<meta property="og:title" content="Diagnóstico Rápido de iPhone">
<meta property="og:description" content="Descubra o problema do seu iPhone de forma rápida e segura.">
<meta property="og:image" content="https://alpha-check.vercel.app/preview.jpg?v=30" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:type" content="website">
<meta property="og:url" content="https://alpha-check.vercel.app">

<meta name="twitter:card" content="summary_large_image">

<style>
body {
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background: #0a0a0a;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.container {
background: #111;
padding: 30px;
border-radius: 20px;
width: 100%;
max-width: 400px;
box-shadow: 0 0 30px rgba(0, 140, 255, 0.3);
}
h1 {
text-align: center;
color: #00aaff;
}
select, input, button {
width: 100%;
margin-top: 10px;
padding: 12px;
border-radius: 10px;
border: none;
font-size: 14px;
}
button {
background: #00aaff;
color: white;
cursor: pointer;
font-weight: bold;
}
button:hover {
opacity: 0.9;
}
.result {
margin-top: 20px;
background: #000;
padding: 15px;
border-radius: 10px;
display: none;
}
a.whatsapp {
display: block;
margin-top: 10px;
text-align: center;
background: #25D366;
padding: 12px;
border-radius: 10px;
color: white;
text-decoration: none;
font-weight: bold;
}
.erro {
color: #ff4d4d;
font-size: 12px;
margin-top: 5px;
display: none;
}
</style>
</head>
<body>

<div class="container">
<h1>Alpha System</h1>

<label>Seu nome</label>
<input type="text" id="nome" placeholder="Digite seu nome">

<label>WhatsApp</label>
<input type="text" id="telefone" placeholder="(55) 99999-9999">

<div class="erro" id="erro">Preencha nome e WhatsApp</div>

<label>Tipo de aparelho</label>
<select id="tipo" onchange="trocarTipo()">
<option value="iphone">iPhone</option>
<option value="android">Android</option>
</select>

<div id="iphoneCampos">
<label>Modelo do iPhone</label>
<select id="modelo">
<option>iPhone SE</option>
<option>iPhone XR</option>
<option>iPhone X/XS</option>
<option>iPhone 11</option>
<option>iPhone 11 Pro</option>
<option>iPhone 11 Pro Max</option>
<option>iPhone 12</option>
<option>iPhone 12 Pro</option>
<option>iPhone 12 Pro Max</option>
<option>iPhone 13</option>
<option>iPhone 13 Pro</option>
<option>iPhone 13 Pro Max</option>
<option>iPhone 14</option>
<option>iPhone 14 Pro</option>
<option>iPhone 14 Pro Max</option>
<option>iPhone 15</option>
<option>iPhone 15 Pro</option>
<option>iPhone 15 Pro Max</option>
<option>iPhone 16</option>
<option>iPhone 16 Pro</option>
<option>iPhone 16 Pro Max</option>
</select>
</div>

<label>Problema</label>
<select id="problema">
<option>Troca de bateria</option>
<option>Troca de tela</option>
<option>Não liga</option>
<option>Sem sinal</option>
<option>Sem WI-FI</option>
<option>iPhone molhado</option>
<option>Face ID não funciona</option>
<option>Não carrega</option>
<option>Problema na câmera</option>
<option>Alto-falante sem som</option>
</select>

<div id="androidCampos" style="display:none;">
<label>Marca do Android</label>
<select id="marca">
<option>Samsung</option>
<option>Xiaomi</option>
<option>Motorola</option>
<option>Outro</option>
</select>
</div>

<div id="campoTempo">
<label>Há quanto tempo começou? (Em caso de defeitos)</label>
<input type="text" id="tempo" placeholder="Ex: 2 dias, 1 semana">
</div>

<button onclick="gerarDiagnostico()">Gerar diagnóstico</button>

<div class="result" id="resultado"></div>
</div>

<script>
window.onload = function () {

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYVp0UBoKy9eiPNdUePPsUZr-i2aIm9qL4NYgBwVvb8ictv3Umkdy5K4dOd73KlAFg/exec";

const problemaSelect = document.getElementById('problema');
const campoTempo = document.getElementById('campoTempo');

window.trocarTipo = function () {
const tipo = document.getElementById('tipo').value;

// alterna campos
document.getElementById('iphoneCampos').style.display = tipo === 'iphone' ? 'block' : 'none';
document.getElementById('androidCampos').style.display = tipo === 'android' ? 'block' : 'none';

// limpa resultado
const resultado = document.getElementById('resultado');
resultado.style.display = "none";
resultado.innerHTML = "";

// limpa tempo
document.getElementById('tempo').value = "";

// 🔥 FORÇA atualização do sistema
verificarProblema();
}

function verificarProblema() {
const tipo = document.getElementById('tipo').value;  
const problema = problemaSelect.value;

if (
tipo === "iphone" && (
problema.includes("Não liga") ||
problema.includes("Sem sinal") ||
problema.includes("WI-FI") ||
problema.includes("Face ID") ||
problema.includes("molhado") ||
problema.includes("carrega") ||
problema.includes("câmera") ||
problema.includes("Alto")
)
) {
campoTempo.style.display = "block";
} else {
campoTempo.style.display = "none";
}
}

problemaSelect.addEventListener('change', verificarProblema);
verificarProblema();

// ✅ CORREÇÃO: executa ao carregar
trocarTipo();

window.gerarDiagnostico = function () {

const nome = document.getElementById('nome').value.trim();
const telefone = document.getElementById('telefone').value.trim();
const erro = document.getElementById('erro');

if (!nome || !telefone) {
erro.style.display = "block";
return;
} else {
erro.style.display = "none";
}

const tipo = document.getElementById('tipo').value;

const modelo = tipo === "iphone"
? document.getElementById('modelo').value
: document.getElementById('marca').value;

const problema = document.getElementById('problema').value;
const tempo = document.getElementById('tempo').value;

let diagnostico = "";
let valor = "";
let prazo = "";

if (tipo === "android") {

// ANDROID (intacto)

if (problema.includes("bateria")) {
diagnostico = "A bateria do aparelho pode estar desgastada, causando descarga rápida ou desligamentos inesperados. A substituição resolve o problema e melhora o desempenho.";
valor = "R$ 150 a R$ 300 (Dependendo do Modelo)";
prazo = "Até 1 hora";
}

else if (problema.includes("tela")) {
diagnostico = "A tela está danificada ou trincada, podendo comprometer o uso do aparelho. A substituição é necessária para restaurar o funcionamento e a estética.";
valor = "R$ 250 a R$ 750 (Dependendo do Modelo)";
prazo = "De 1 a 3 horas";
}

else if (problema.includes("Não liga")) {
diagnostico = "O aparelho não está ligando. Pode estar relacionado à bateria, Falha de carregamento ou até mesmo Curto-circuito na Placa Mãe . É necessária análise para identificar a causa.";
valor = "R$ 150 a R$ 600";
prazo = "1 a 3 dias";
}

else if (problema.includes("Não carrega")) {
diagnostico = "Falha no carregamento, podendo ser no conector de carga ou circuito interno na Placa Mãe. Realizamos testes para identificar e resolver o problema.";
valor = "R$ 90 a R$ 350";
prazo = "Até 1 dia";
}

else if (problema.includes("Sem sinal")) {
diagnostico = "O aparelho não está reconhecendo sinal de rede. Pode estar relacionado a configurações do sistema ou falhas na Placa Mãe. É necessária uma análise para identicar";
valor = "R$ 150 a R$ 500";
prazo = "1 a 2 dias";
}

else if (problema.includes("molhado")) {
diagnostico = "O aparelho teve contato com líquido. É essencial limpeza interna imediata para evitar danos maiores. Neste caso o tempo é determinante para a recuperação do aparelho";
valor = "R$ 150 a R$ 400";
prazo = "1 a 3 dias";
}

else if (problema.includes("câmera")) {
diagnostico = "A câmera apresenta falhas. Está embaçada ou inoperante. Pode precisar de substituição para voltar ao funcionamento normal.";
valor = "R$ 150 a R$ 350";
prazo = "Até 1 dia";
}

else if (problema.includes("Alto")) {
diagnostico = "O aparelho está com falhas no áudio. Pode ser necessário limpeza ou troca do Alto-falante.";
valor = "R$ 50 a R$ 200";
prazo = "Até 1 dia";
}

} else {

// IPHONE 100% INTACTO

if (problema.includes("bateria")) {
diagnostico = "A bateria do seu iPhone apresenta desgaste natural ou falha, causando descarregamento rápido ou desligamentos inesperados. A substituição resolve o problema e melhora o desempenho do aparelho.";
valor = "R$ 250 - R$ 550";
prazo = "60 a 120 minutos";

} else if (problema.includes("tela")) {
diagnostico = "A tela está danificada ou não responde corretamente ao toque. É necessário substituir o display para restaurar a imagem e o funcionamento normal.";
valor = "R$ 250 - R$ 1350";
prazo = "60 a 120 minutos";

} else if (problema.includes("Não liga")) {
diagnostico = "Seu iPhone não está ligando. Isso pode estar relacionado à bateria, sistema de carregamento ou até mesmo Curto-circuito na Placa Mãe. Realizamos testes para identificar a causa exata e resolver com segurança.";
valor = "R$ 300 - R$ 900";
prazo = "1 a 3 dias";

} else if (problema.includes("Sem sinal")) {
diagnostico = "O aparelho não está reconhecendo sinal de rede. Isso pode estar relacionado a configurações, componentes internos ou ate mesmo defeito na Placa Mãe. É necessária análise mais aprofundada para identificar a causa.";
valor = "R$ 250 - R$ 600";
prazo = "1 a 2 dias";

} else if (problema.includes("WI-FI")) {
diagnostico = "Problema no Wi-Fi, pode ser configuração, Bug de Atualização ou Defeito na Placa Mãe, é necessária análise mais aprofundada para identificar a causa.";
valor = "R$ 250 - R$ 600";
prazo = "1 a 2 dias";

} else if (problema.includes("molhado")) {
diagnostico = "O aparelho teve contato com líquido, o que pode causar falhas progressivas ou imediatas. É essencial realizar limpeza interna e análise completa para evitar danos maiores.";
valor = "R$ 150 - R$ 600";
prazo = "1 a 3 dias";

} else if (problema.includes("Face ID")) {
diagnostico = "O Face ID não está funcionando corretamente. Pode estar relacionado a sensores ou componentes internos. Realizamos análise completa para identificar e corrigir o problema.";
valor = "R$ 300 - R$ 800";
prazo = "1 a 2 dias";

} else if (problema.includes("carrega")) {
diagnostico = "O iPhone apresenta falha ao carregar ou conexão instável. Pode estar relacionado ao conector de carga ou até mesmo defeito na Placa Mãe. É necessária uma análise mais aprofundada.";
valor = "R$ 250 - R$ 500";
prazo = "1 dia";

} else if (problema.includes("câmera")) {
diagnostico = "A câmera apresenta falhas, como imagem embaçada ou sem funcionamento. Pode ser necessário substituir o componente.";
valor = "R$ 250 - R$ 700";
prazo = "1 dia";

} else if (problema.includes("Alto")) {
diagnostico = "O som do aparelho está baixo, falhando ou sem funcionar. Pode ser necessário realizar limpeza ou substituição do alto-falante.";
valor = "R$ 150 - R$ 350";
prazo = "1 dia";
}

}

// 🔥 restante igual
fetch(SCRIPT_URL, {
method: "POST",
body: JSON.stringify({
nome,
telefone,
modelo,
problema,
diagnostico
})
});

const mensagem = `Olá, fiz um diagnóstico no Alpha System:

Nome: ${nome}
Telefone: ${telefone}

Modelo: ${modelo}
Problema: ${problema}
Tempo: ${tempo}

Diagnóstico: ${diagnostico}
Valor estimado: ${valor}
Prazo: ${prazo}`;

const link = `https://wa.me/55991269300?text=${encodeURIComponent(mensagem)}`;

const resultado = document.getElementById('resultado');
resultado.style.display = "block";
resultado.innerHTML = `
<strong>Diagnóstico:</strong> ${diagnostico}<br>
<strong>Valor:</strong> ${valor}<br>
<strong>Prazo:</strong> ${prazo}
<a class="whatsapp" href="${link}" target="_blank">Falar no WhatsApp</a>
`;
};

};
</script>

</body>
</html>
