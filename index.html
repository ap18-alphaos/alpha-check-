<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Alpha System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="/icon-192.png">

<meta property="og:title" content="Diagnóstico Rápido de iPhone">
<meta property="og:description" content="Descubra o problema do seu iPhone de forma rápida e segura.">
<meta property="og:image" content="https://alpha-check.vercel.app/preview.jpg?v=30" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:type" content="website">
<meta property="og:url" content="https://alpha-check.vercel.app">

<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.container { background: #111; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 140, 255, 0.3); }
h1 { text-align: center; color: #00aaff; }
select, input, button { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; font-size: 14px; }
button { background: #00aaff; color: white; cursor: pointer; font-weight: bold; }
.result { margin-top: 20px; background: #000; padding: 15px; border-radius: 10px; display: none; }
a.whatsapp { display: block; margin-top: 10px; text-align: center; background: #25D366; padding: 12px; border-radius: 10px; color: white; text-decoration: none; font-weight: bold; }
.erro { color: #ff4d4d; font-size: 12px; margin-top: 5px; display: none; }
</style>
</head>

<body>
<div class="container">

<h1>Alpha System</h1>

<label>Seu nome</label>
<input type="text" id="nome">

<label>WhatsApp</label>
<input type="text" id="telefone">

<div class="erro" id="erro">Preencha nome e WhatsApp</div>

<label>Tipo de aparelho</label>
<select id="tipo" onchange="trocarTipo()">
<option value="iphone">iPhone</option>
<option value="android">Android</option>
</select>

<div id="iphoneCampos">

<label>Modelo do iPhone</label>
<select id="modelo">
<option>iPhone 11</option>
<option>iPhone 12</option>
<option>iPhone 13</option>
<option>iPhone 14</option>
<option>iPhone 15</option>
<option>iPhone 16</option>
</select>

</div>

<div id="androidCampos" style="display:none;">

<label>Marca</label>
<select id="marca">
<option>Samsung</option>
<option>Xiaomi</option>
<option>Motorola</option>
<option>Outro</option>
</select>

</div>

<label>Problema</label>
<select id="problema">
<option>Troca de bateria</option>
<option>Troca de tela</option>
<option>Não liga</option>
<option>Não carrega</option>
<option>Sem sinal</option>
<option>Aparelho molhado</option>
<option>Problema na câmera</option>
<option>Sem som</option>
</select>

<div id="campoTempo">
<label>Há quanto tempo começou?</label>
<input type="text" id="tempo">
</div>

<button onclick="gerarDiagnostico()">Gerar diagnóstico</button>

<div class="result" id="resultado"></div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYVp0UBoKy9eiPNdUePPsUZr-i2aIm9qL4NYgBwVvb8ictv3Umkdy5K4dOd73KlAFg/exec";

function trocarTipo() {
const tipo = document.getElementById('tipo').value;
document.getElementById('iphoneCampos').style.display = tipo === 'iphone' ? 'block' : 'none';
document.getElementById('androidCampos').style.display = tipo === 'android' ? 'block' : 'none';
}

function gerarDiagnostico() {

const nome = document.getElementById('nome').value;
const telefone = document.getElementById('telefone').value;

if (!nome || !telefone) {
document.getElementById('erro').style.display = "block";
return;
}

const tipo = document.getElementById('tipo').value;
const problema = document.getElementById('problema').value;

let modelo = tipo === 'iphone'
? document.getElementById('modelo').value
: document.getElementById('marca').value;

let diagnostico = "";
let valor = "";
let prazo = "";

if (problema.includes("bateria")) {
diagnostico = "Substituição de bateria recomendada.";
valor = "R$ 150 - R$ 400";
prazo = "1 hora";
}

if (problema.includes("tela")) {
diagnostico = "Troca de tela necessária.";
valor = "R$ 200 - R$ 1200";
prazo = "1 hora";
}

if (problema.includes("Não liga")) {
diagnostico = "Possível falha interna. Necessária análise.";
valor = "R$ 150 - R$ 600";
prazo = "1 a 3 dias";
}

fetch(SCRIPT_URL, {
method: "POST",
body: JSON.stringify({ nome, telefone, modelo, problema, diagnostico })
});

const mensagem = `Diagnóstico Alpha System:

Nome: ${nome}
Telefone: ${telefone}
Aparelho: ${modelo}
Problema: ${problema}

${diagnostico}`;

const link = `https://wa.me/55991269300?text=${encodeURIComponent(mensagem)}`;

document.getElementById('resultado').style.display = "block";
document.getElementById('resultado').innerHTML = `
${diagnostico}<br>
<a class="whatsapp" href="${link}" target="_blank">Falar no WhatsApp</a>
`;
}
</script>

</body>
</html>
