<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Alpha Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(0, 140, 255, 0.3);
    }
    h1 {
      text-align: center;
      color: #00aaff;
    }
    select, input, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }
    button {
      background: #00aaff;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      opacity: 0.9;
    }
    .result {
      margin-top: 20px;
      background: #000;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
    a.whatsapp {
      display: block;
      margin-top: 10px;
      text-align: center;
      background: #25D366;
      padding: 12px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Alpha Check</h1>

  <label>Modelo do iPhone</label>
  <select id="modelo">
    <option>iPhone 11</option>
    <option>iPhone 12</option>
    <option>iPhone 13</option>
    <option>iPhone 14</option>
    <option>iPhone 15</option>
    <option>iPhone 16</option>
  </select>

  <label>Problema</label>
  <select id="problema">
    <option>Bateria descarregando rápido</option>
    <option>Não liga</option>
    <option>Sem sinal</option>
    <option>Face ID não funciona</option>
    <option>Tela quebrada</option>
  </select>

  <label>Há quanto tempo começou?</label>
  <input type="text" id="tempo" placeholder="Ex: 2 dias, 1 semana">

  <button onclick="gerarDiagnostico()">Gerar diagnóstico</button>

  <div class="result" id="resultado"></div>
</div>

<script>
function gerarDiagnostico() {
  const modelo = document.getElementById('modelo').value;
  const problema = document.getElementById('problema').value;
  const tempo = document.getElementById('tempo').value;

  let diagnostico = "";
  let valor = "";
  let prazo = "";

  if (problema.includes("Bateria")) {
    diagnostico = "Provável desgaste natural da bateria.";
    valor = "R$ 200 - R$ 350";
    prazo = "30 a 60 minutos";
  } else if (problema.includes("Não liga")) {
    diagnostico = "Possível falha na placa ou bateria.";
    valor = "R$ 300 - R$ 800";
    prazo = "1 a 3 dias";
  } else if (problema.includes("Sem sinal")) {
    diagnostico = "Pode ser problema de antena ou baseband.";
    valor = "R$ 250 - R$ 600";
    prazo = "1 a 2 dias";
  } else if (problema.includes("Face ID")) {
    diagnostico = "Falha em sensores ou flex.";
    valor = "R$ 300 - R$ 700";
    prazo = "1 a 2 dias";
  } else if (problema.includes("Tela")) {
    diagnostico = "Necessária substituição de display.";
    valor = "R$ 400 - R$ 900";
    prazo = "40 minutos";
  }

  const mensagem = `Olá, fiz um diagnóstico no Alpha Check:

Modelo: ${modelo}
Problema: ${problema}
Tempo: ${tempo}

Diagnóstico: ${diagnostico}
Valor estimado: ${valor}
Prazo: ${prazo}`;

  const link = `https://wa.me/55991269300?text=${encodeURIComponent(mensagem)}`;

  const resultado = document.getElementById('resultado');
  resultado.style.display = "block";
  resultado.innerHTML = `
    <strong>Diagnóstico:</strong> ${diagnostico}<br>
    <strong>Valor:</strong> ${valor}<br>
    <strong>Prazo:</strong> ${prazo}
    <a class="whatsapp" href="${link}" target="_blank">Falar no WhatsApp</a>
  `;
}
</script>

</body>
</html>
